<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Blog Admin | SPACE GLEAM</title>
    <link rel="icon" href="https://spacegleam.co.jp/favicon.png">
    <link rel="stylesheet" href="https://spacegleam.co.jp/style.css?v=blog-editor-20260602-admin">
    <style>
        :root {
            --admin-bg: #f5f3ef;
            --admin-ink: #111111;
            --admin-muted: #62615d;
            --admin-line: rgba(17, 17, 17, 0.10);
            --admin-panel: rgba(255, 255, 255, 0.88);
            --admin-panel-solid: #ffffff;
            --admin-radius: 8px;
        }

        body.blog-admin-body {
            min-height: 100vh;
            color: var(--admin-ink);
            background:
                radial-gradient(circle at 12% 8%, rgba(255,255,255,0.92), transparent 34%),
                radial-gradient(circle at 82% 0%, rgba(225,218,205,0.75), transparent 32%),
                linear-gradient(180deg, #faf8f3 0%, var(--admin-bg) 48%, #efebe4 100%);
        }

        .blog-admin-body .header {
            background: rgba(250, 248, 243, 0.82);
            border-bottom: 1px solid var(--admin-line);
            backdrop-filter: blur(18px);
        }

        .blog-admin-main {
            padding: 118px 0 80px;
        }

        .blog-admin-shell {
            display: grid;
            gap: 26px;
        }

        .blog-admin-hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 24px;
            align-items: end;
            padding: 32px;
            background: rgba(255,255,255,0.58);
            border: 1px solid var(--admin-line);
            border-radius: var(--admin-radius);
            box-shadow: 0 22px 70px rgba(17,17,17,0.08);
        }

        .blog-admin-kicker {
            display: inline-flex;
            width: fit-content;
            align-items: center;
            gap: 8px;
            margin: 0 0 14px;
            padding: 6px 10px;
            color: #2d2b27;
            background: #ffffff;
            border: 1px solid var(--admin-line);
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .blog-admin-kicker::before {
            content: "";
            width: 8px;
            height: 8px;
            background: #32c36c;
            border-radius: 999px;
            box-shadow: 0 0 0 5px rgba(50,195,108,0.14);
        }

        .blog-admin-title {
            max-width: 760px;
            margin: 0;
            color: var(--admin-ink);
            font-size: clamp(2.2rem, 5vw, 4.7rem);
            line-height: 0.96;
            letter-spacing: 0;
        }

        .blog-admin-lead {
            max-width: 690px;
            margin: 18px 0 0;
            color: var(--admin-muted);
            font-size: 1rem;
            line-height: 1.85;
        }

        .blog-admin-quick {
            display: grid;
            grid-template-columns: repeat(2, minmax(150px, 1fr));
            gap: 10px;
            min-width: 330px;
        }

        .blog-admin-stat {
            padding: 18px;
            background: #111111;
            color: #ffffff;
            border-radius: var(--admin-radius);
        }

        .blog-admin-stat:nth-child(2) {
            background: #ffffff;
            color: var(--admin-ink);
            border: 1px solid var(--admin-line);
        }

        .blog-admin-stat span {
            display: block;
            margin-bottom: 14px;
            color: currentColor;
            opacity: 0.68;
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .blog-admin-stat strong {
            display: block;
            font-size: 1.2rem;
            line-height: 1.35;
            letter-spacing: 0;
        }

        .blog-admin-guide {
            max-width: none;
            margin: 0;
            padding: 0;
        }

        .blog-admin-guide h2 {
            margin: 0 0 14px;
            font-size: 1rem;
            letter-spacing: 0;
        }

        .blog-admin-guide ol {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            padding: 0;
            list-style: none;
            counter-reset: admin-step;
        }

        .blog-admin-guide li {
            counter-increment: admin-step;
            min-height: 122px;
            padding: 18px;
            color: #4f4d48;
            background: var(--admin-panel);
            border: 1px solid var(--admin-line);
            border-radius: var(--admin-radius);
            line-height: 1.75;
        }

        .blog-admin-guide li::before {
            content: counter(admin-step, decimal-leading-zero);
            display: block;
            margin-bottom: 14px;
            color: #111111;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.12em;
        }

        .blog-admin-body .blog-editor-layout {
            grid-template-columns: minmax(430px, 0.86fr) minmax(0, 1.14fr);
            gap: 18px;
            align-items: start;
        }

        .blog-admin-body .blog-editor-form,
        .blog-admin-body .blog-editor-output {
            padding: 20px;
            background: var(--admin-panel-solid);
            border: 1px solid var(--admin-line);
            border-radius: var(--admin-radius);
            box-shadow: 0 18px 52px rgba(17,17,17,0.06);
        }

        .blog-editor-section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 0 0 4px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--admin-line);
        }

        .blog-editor-section-title h2 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 0;
        }

        .blog-editor-section-title span {
            color: var(--admin-muted);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .blog-admin-body .blog-editor-form label,
        .blog-admin-body .blog-editor-output label,
        .blog-admin-body .blog-editor-image-field {
            color: #24231f;
            font-size: 0.82rem;
            letter-spacing: 0.02em;
        }

        .blog-admin-body .blog-editor-form input,
        .blog-admin-body .blog-editor-form select,
        .blog-admin-body .blog-editor-form textarea,
        .blog-admin-body .blog-editor-output textarea {
            min-height: 48px;
            background: #f7f5f0;
            border: 1px solid rgba(17,17,17,0.09);
            border-radius: var(--admin-radius);
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .blog-admin-body .blog-editor-form input:focus,
        .blog-admin-body .blog-editor-form select:focus,
        .blog-admin-body .blog-editor-form textarea:focus,
        .blog-admin-body .blog-editor-output textarea:focus {
            background: #ffffff;
            border-color: rgba(17,17,17,0.34);
            box-shadow: 0 0 0 4px rgba(17,17,17,0.06);
        }

        .blog-admin-body .blog-editor-drafts {
            padding: 14px;
            background: #f7f5f0;
            border: 1px solid var(--admin-line);
            border-radius: var(--admin-radius);
        }

        .blog-admin-body .blog-editor-draft-actions button,
        .blog-admin-body .blog-editor-slug-row button,
        .blog-admin-body .blog-editor-actions button,
        .blog-admin-body .blog-editor-image-clear {
            border-radius: var(--admin-radius);
            background: #ffffff;
            transition: transform 0.18s ease, border-color 0.18s ease;
        }

        .blog-admin-body button:hover {
            transform: translateY(-1px);
        }

        .blog-admin-body .blog-editor-image-dropzone {
            min-height: 116px;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.72), transparent 44%),
                #f0ede6;
            border-radius: var(--admin-radius);
        }

        .blog-admin-body .blog-editor-image-preview {
            min-height: 220px;
            border-radius: var(--admin-radius);
        }

        .blog-admin-body .blog-editor-submit,
        .blog-admin-body .blog-editor-publish-panel button,
        .blog-admin-body .blog-editor-notify button {
            width: 100%;
            justify-content: center;
            min-height: 52px;
            border-radius: var(--admin-radius);
        }

        .blog-admin-body .blog-editor-publish-panel,
        .blog-admin-body .blog-editor-notify,
        .blog-admin-body .blog-editor-manual-output {
            border-radius: var(--admin-radius);
            border-color: var(--admin-line);
        }

        .blog-admin-body .blog-editor-publish-panel {
            background:
                linear-gradient(135deg, rgba(255,255,255,0.88), transparent 44%),
                #111111;
            color: #ffffff;
        }

        .blog-admin-body .blog-editor-publish-panel h2,
        .blog-admin-body .blog-editor-publish-panel p,
        .blog-admin-body .blog-editor-publish-panel p[data-state="success"],
        .blog-admin-body .blog-editor-publish-panel p[data-state="error"] {
            color: #ffffff;
        }

        .blog-admin-body .blog-editor-publish-panel p {
            opacity: 0.74;
        }

        .blog-admin-body .blog-editor-publish-panel button {
            color: #111111;
            background: #ffffff;
        }

        @media (max-width: 1080px) {
            .blog-admin-hero,
            .blog-admin-body .blog-editor-layout {
                grid-template-columns: 1fr;
            }

            .blog-admin-quick {
                min-width: 0;
            }

            .blog-admin-guide ol {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .blog-admin-main {
                padding-top: 92px;
            }

            .blog-admin-hero,
            .blog-admin-body .blog-editor-form,
            .blog-admin-body .blog-editor-output {
                padding: 18px;
            }

            .blog-admin-guide ol,
            .blog-admin-quick {
                grid-template-columns: 1fr;
            }
        }
        /* Admin simplified layout overrides */
        .blog-admin-body .blog-editor-form input,
        .blog-admin-body .blog-editor-form select,
        .blog-admin-body .blog-editor-form textarea,
        .blog-admin-body .blog-editor-manual-output textarea {
            background: #ffffff !important;
            color: #111827 !important;
            border: 1px solid #d1d5db !important;
        }
        .blog-admin-body .blog-editor-form input:focus,
        .blog-admin-body .blog-editor-form select:focus,
        .blog-admin-body .blog-editor-form textarea:focus,
        .blog-admin-body .blog-editor-manual-output textarea:focus {
            background: #ffffff !important;
            border-color: #111827 !important;
            outline: none;
            box-shadow: 0 0 0 2px rgba(17, 24, 39, 0.08);
        }
        .blog-admin-body .blog-editor-layout { grid-template-columns: 1fr !important; }
        .blog-admin-body .header .header-cta {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 14px; font-size: 13px; font-weight: 600;
            border: 1px solid #111827; background: #111827; color: #fff;
            border-radius: 999px; cursor: pointer;
        }
        .blog-admin-body .header .header-cta-secondary {
            background: #fff; color: #111827;
        }
        .blog-admin-body .header .header-cta:hover { opacity: 0.85; }
        .blog-admin-body .header [data-admin-toolbar] { display: flex; gap: 8px; }
        .blog-admin-body .blog-editor-status-bar {
            display: flex; gap: 16px; flex-wrap: wrap;
            margin: 8px 0 0; min-height: 0;
        }
        .blog-admin-body .blog-editor-status-bar p {
            margin: 0; font-size: 13px; color: #6b7280;
        }
        .blog-admin-body .blog-editor-status-bar p:empty { display: none; }
        .blog-admin-body .blog-editor-manual-output { margin-top: 20px; }
        .blog-admin-body .blog-editor-drafts-compact {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            padding: 8px 0; border: none; background: transparent;
        }
        .blog-admin-body .blog-editor-drafts-compact select { flex: 1; min-width: 200px; }
        .blog-admin-body .blog-editor-drafts-compact button {
            padding: 8px 14px; font-size: 13px;
        }
        .blog-admin-body .blog-editor-drafts-compact .blog-editor-draft-status {
            flex-basis: 100%; margin: 0; font-size: 12px; color: #6b7280;
        }
        .blog-admin-body .blog-editor-drafts-compact .blog-editor-draft-status:empty { display: none; }
        .blog-admin-body .blog-editor-date-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        @media (max-width: 600px) {
            .blog-admin-body .blog-editor-date-row { grid-template-columns: 1fr; }
        }
        .blog-admin-body .blog-editor-draft-list {
            list-style: none; margin: 6px 0 14px; padding: 0;
            display: flex; flex-direction: column; gap: 4px;
            max-height: 180px; overflow-y: auto;
            border: 1px solid #e5e7eb; border-radius: 8px; background: #fff;
        }
        .blog-admin-body .blog-editor-draft-list:empty {
            display: none;
        }
        .blog-admin-body .blog-editor-draft-list li {
            padding: 8px 12px; cursor: pointer; font-size: 13px;
            border-bottom: 1px solid #f3f4f6;
            display: flex; justify-content: space-between; align-items: center; gap: 8px;
        }
        .blog-admin-body .blog-editor-draft-list li:last-child { border-bottom: none; }
        .blog-admin-body .blog-editor-draft-list li:hover { background: #f9fafb; }
        .blog-admin-body .blog-editor-draft-list li[aria-current="true"] {
            background: #111827; color: #fff;
        }
        .blog-admin-body .blog-editor-draft-list li time {
            font-size: 11px; opacity: 0.7;
        }
        .blog-admin-body .blog-editor-image-actions {
            display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;
        }
        .blog-admin-body .blog-editor-image-actions button {
            padding: 8px 14px; font-size: 13px;
        }
        .blog-admin-body .blog-editor-auto-category {
            margin: 0 0 6px; font-size: 12px; color: #6b7280;
        }
        .blog-admin-body .blog-editor-auto-category strong {
            color: #111827; font-weight: 600; margin-left: 4px;
            padding: 2px 8px; border-radius: 999px; background: #f3f4f6;
        }
        .blog-admin-body .blog-editor-date-hint {
            margin: 4px 0 0; font-size: 12px; color: #6b7280;
        }
        .blog-admin-body .blog-editor-date-hint strong {
            color: #111827; font-weight: 600;
        }

        /* === Unified button system === */
        .blog-admin-body .blog-editor-form button:not(.blog-editor-image-dropzone),
        .blog-admin-body .blog-editor-manual-output button,
        .blog-admin-body .header-cta {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 9px 16px;
            font-family: inherit;
            font-size: 13px; font-weight: 500;
            line-height: 1.2;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: #ffffff;
            color: #111827;
            cursor: pointer;
            transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.05s ease;
            box-shadow: 0 1px 0 rgba(17,24,39,0.04);
            letter-spacing: 0.01em;
        }
        .blog-admin-body .blog-editor-form button:hover:not(.blog-editor-image-dropzone),
        .blog-admin-body .blog-editor-manual-output button:hover {
            background: #f9fafb; border-color: #d1d5db;
        }
        .blog-admin-body .blog-editor-form button:active:not(.blog-editor-image-dropzone),
        .blog-admin-body .blog-editor-manual-output button:active {
            transform: translateY(1px);
        }

        /* Primary (header main action) */
        .blog-admin-body .header [data-copy-publish-package],
        .blog-admin-body .blog-editor-form [data-save-draft] {
            background: #111827; color: #ffffff; border-color: #111827;
        }
        .blog-admin-body .header [data-copy-publish-package]:hover,
        .blog-admin-body .blog-editor-form [data-save-draft]:hover {
            background: #1f2937; border-color: #1f2937;
        }

        /* Secondary (header alt action) */
        .blog-admin-body .header [data-send-notify] {
            background: #ffffff; color: #111827; border-color: #d1d5db;
        }
        .blog-admin-body .header [data-send-notify]:hover {
            background: #f9fafb;
        }

        /* Destructive (delete, clear) */
        .blog-admin-body .blog-editor-form [data-delete-draft],
        .blog-admin-body .blog-editor-form [data-clear-image] {
            color: #b91c1c; border-color: #fecaca; background: #ffffff;
        }
        .blog-admin-body .blog-editor-form [data-delete-draft]:hover,
        .blog-admin-body .blog-editor-form [data-clear-image]:hover {
            background: #fef2f2; border-color: #fca5a5;
        }

        /* Preview (subtle accent) */
        .blog-admin-body .blog-editor-form [data-preview-draft] {
            color: #1d4ed8; border-color: #bfdbfe;
        }
        .blog-admin-body .blog-editor-form [data-preview-draft]:hover {
            background: #eff6ff; border-color: #93c5fd;
        }

        /* Generate (accent purple) */
        .blog-admin-body .blog-editor-form [data-image-generate] {
            background: linear-gradient(135deg, #6d28d9, #2563eb);
            color: #ffffff; border-color: transparent;
            font-weight: 600;
        }
        .blog-admin-body .blog-editor-form [data-image-generate]:hover {
            filter: brightness(1.06);
        }
        .blog-admin-body .blog-editor-form [data-image-generate]::before {
            content: "✦"; font-size: 14px;
        }

        /* Inline tiny buttons (slug helpers) */
        .blog-admin-body .blog-editor-form .blog-editor-slug-row button {
            padding: 7px 12px; font-size: 12px;
        }

        /* Dropzone visual cleanup */
        .blog-admin-body .blog-editor-image-dropzone {
            display: block; width: 100%;
            padding: 24px 16px;
            font-size: 13px; color: #6b7280;
            background: #fafafa;
            border: 1.5px dashed #d1d5db; border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.15s ease, border-color 0.15s ease;
        }
        .blog-admin-body .blog-editor-image-dropzone:hover {
            background: #f3f4f6; border-color: #9ca3af;
        }

        /* Manual output copy buttons row */
        .blog-admin-body .blog-editor-actions {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
        }

        /* === Workspace 2-column layout (sidebar + editor) === */
        .blog-admin-body .blog-editor-workspace {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            gap: 24px;
            align-items: start;
        }
        @media (max-width: 900px) {
            .blog-admin-body .blog-editor-workspace { grid-template-columns: 1fr; }
        }

        /* Sidebar */
        .blog-admin-body .blog-editor-sidebar {
            position: sticky; top: 80px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px 12px 14px;
            box-shadow: 0 1px 2px rgba(17,24,39,0.04);
            max-height: calc(100vh - 100px);
            display: flex; flex-direction: column;
        }
        @media (max-width: 900px) {
            .blog-admin-body .blog-editor-sidebar { position: static; max-height: none; }
        }
        .blog-admin-body .blog-editor-sidebar-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 4px 4px 10px; margin-bottom: 8px;
            border-bottom: 1px solid #f3f4f6;
        }
        .blog-admin-body .blog-editor-sidebar-head h2 {
            margin: 0; font-size: 13px; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: #6b7280;
        }
        .blog-admin-body .blog-editor-new-draft {
            width: 28px; height: 28px; padding: 0;
            font-size: 18px; line-height: 1; font-weight: 400;
            border: 1px solid #e5e7eb; background: #fff; color: #111827;
            border-radius: 8px; cursor: pointer;
            transition: background-color 0.15s ease;
        }
        .blog-admin-body .blog-editor-new-draft:hover {
            background: #f3f4f6; border-color: #d1d5db;
        }

        /* Sidebar list overrides */
        .blog-admin-body .blog-editor-sidebar .blog-editor-draft-list {
            max-height: none; border: none; background: transparent;
            overflow-y: auto; flex: 1; padding: 2px;
        }
        .blog-admin-body .blog-editor-sidebar .blog-editor-draft-list li {
            border-bottom: none; border-radius: 8px; padding: 9px 10px;
            font-size: 13px; line-height: 1.4;
            display: block;
        }
        .blog-admin-body .blog-editor-sidebar .blog-editor-draft-list li:hover {
            background: #f3f4f6;
        }
        .blog-admin-body .blog-editor-sidebar .blog-editor-draft-list li[aria-current="true"] {
            background: #111827; color: #fff;
        }
        .blog-admin-body .blog-editor-sidebar-empty {
            margin: 12px 8px; font-size: 12px; color: #9ca3af; text-align: center;
        }

        /* Toolbar under sidebar (save/preview/delete) above the form */
        .blog-admin-body .blog-editor-toolbar {
            display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
            padding: 10px 0 14px;
            border-bottom: 1px solid #f3f4f6;
            margin-bottom: 16px;
        }
        .blog-admin-body .blog-editor-toolbar .blog-editor-draft-status {
            margin: 0 0 0 auto; font-size: 12px; color: #6b7280;
        }
        .blog-admin-body .blog-editor-toolbar .blog-editor-draft-status:empty { display: none; }
        .blog-admin-body .blog-format-toolbar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
            margin: -4px 0 8px;
        }
        .blog-admin-body .blog-format-toolbar button {
            width: 34px;
            height: 32px;
            padding: 0 !important;
            font-size: 13px;
            font-weight: 700;
            line-height: 1;
        }
        .blog-admin-body .blog-format-toolbar [data-format="italic"] {
            font-style: italic;
        }
        .blog-admin-body .blog-format-toolbar [data-format="h2"] {
            width: 42px;
            font-size: 12px;
        }
        .blog-admin-body .blog-preview-panel {
            position: fixed;
            inset: 18px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            background: #ffffff;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(17,24,39,0.12);
        }
        .blog-admin-body .blog-preview-panel[hidden] {
            display: none;
        }
        .blog-admin-body .blog-preview-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            border-bottom: 1px solid #e5e7eb;
            background: #f9fafb;
        }
        .blog-admin-body .blog-preview-head strong {
            font-size: 13px;
            color: #111827;
        }

    <script>

          await new Promise(r => setTimeout(r, 100));
          const data = gatherPayload();
          if (!data.slug || !data.title) throw new Error('スラッグとタイトルは必須です');

          const res = await fetch('/.netlify/functions/blog-publish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ ...data, mode })

          const json = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
          if (status) {
            if (mode === 'scheduled') {
              status.textContent = `予約登録しました（${json.publishAt}）`;

            }
            status.dataset.state = 'success';
          }
        } catch (e) {
          if (status) { status.textContent = '失敗: ' + (e.message || e); status.dataset.state = 'error'; }
        }
      }

      const btnImmediate = $('[data-publish-immediate]');

      function detectCategory() {

        const text = (title + ' ' + desc + ' ' + body).toLowerCase();
        let best = 'Development', bestScore = 0;
        RULES.forEach(r => {
          const score = r.keys.reduce((s,k) => s + (text.includes(k.toLowerCase()) ? 1 : 0), 0);
          if (score > bestScore) { bestScore = score; best = r.cat; }

      // --- (3) Body formatting toolbar + preview button ---
      function setBodyValue(value, selectStart, selectEnd) {
        const textarea = $('textarea[name=body]');
        if (!textarea) return;
        textarea.value = value;
        textarea.focus();
        textarea.setSelectionRange(selectStart, selectEnd);

      function wrapBodySelection(prefix, suffix, placeholder) {
        const textarea = $('textarea[name=body]');
        if (!textarea) return;
        const start = textarea.selectionStart || 0;
        const end = textarea.selectionEnd || start;
        const selected = textarea.value.slice(start, end) || placeholder;
        const next = textarea.value.slice(0, start) + prefix + selected + suffix + textarea.value.slice(end);
        const innerStart = start + prefix.length;
        setBodyValue(next, innerStart, innerStart + selected.length);
      }

      function prefixBodyLines(prefix) {
        const textarea = $('textarea[name=body]');
        if (!textarea) return;
        const start = textarea.selectionStart || 0;
        const end = textarea.selectionEnd || start;
        const lineStart = textarea.value.lastIndexOf('\n', Math.max(0, start - 1)) + 1;
        const lineEndIndex = textarea.value.indexOf('\n', end);
        const lineEnd = lineEndIndex === -1 ? textarea.value.length : lineEndIndex;
        const selected = textarea.value.slice(lineStart, lineEnd) || 'テキスト';
        const nextBlock = selected.split('\n').map(line => line.startsWith(prefix) ? line : prefix + line).join('\n');
        const next = textarea.value.slice(0, lineStart) + nextBlock + textarea.value.slice(lineEnd);
        setBodyValue(next, lineStart, lineStart + nextBlock.length);

          if (format === 'list') prefixBodyLines('- ');

      function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
      function mdToHtml(src) {
        // Mirror blog renderer rules:
        //  ## heading → <h2>
        //  - item / * item → <ul><li>
        //  **bold** → <strong>
        //  *italic* → <em>
        //  blank line separates paragraphs
        const lines = String(src||'').replace(/\r\n?/g,'\n').split('\n');
        let html = '', inList = false, paraBuf = [];
        const flushPara = () => { if (paraBuf.length) { html += '<p>' + paraBuf.join('<br>') + '</p>'; paraBuf = []; } };
        const closeList = () => { if (inList) { html += '</ul>'; inList = false; } };
        for (let raw of lines) {
          const line = raw.trim();
          if (!line) { flushPara(); closeList(); continue; }
          let m;
          if (m = line.match(/^##\s+(.+)$/)) { flushPara(); closeList(); html += '<h2>' + esc(m[1]) + '</h2>'; continue; }
          if (m = line.match(/^#\s+(.+)$/))  { flushPara(); closeList(); html += '<h1>' + esc(m[1]) + '</h1>'; continue; }
          if (m = line.match(/^[-*]\s+(.+)$/)) {
            flushPara();
            if (!inList) { html += '<ul>'; inList = true; }
            html += '<li>' + inline(m[1]) + '</li>';
            continue;
          }
          closeList();
          paraBuf.push(inline(line));
        }
        flushPara(); closeList();
        return html;
        function inline(s){
          return esc(s)
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/(^|[^*])\*(?!\s)([^*]+?)\*(?!\*)/g, '$1<em>$2</em>');
        }

<body class="blog-page-body">

        // 1. Bauhaus blocks (large rectangles + circle accent)
        function bauhaus(ctx, p) {

            ctx.globalAlpha = 0.7 + Math.random()*0.25;
            ctx.beginPath();
            ctx.arc(cx, cy, i*45, 0, Math.PI*2);
            ctx.fill();
          }
        },
        // 3. Diagonal stripes
        function diagStripes(ctx, p) {
          ctx.save();
          ctx.translate(600, 315);
          ctx.rotate(-Math.PI/4);
          for (let i=-12;i<12;i++) {
            ctx.fillStyle = p[1 + Math.floor(Math.random()*(p.length-1))];
            ctx.globalAlpha = 0.7 + Math.random()*0.25;
            const h = 30 + Math.random()*60;
            ctx.fillRect(-900, i*90, 1800, h);
          }
          ctx.restore();
        },
        // 4. Grid of dots
        function dotGrid(ctx, p) {
          const cols = 18, rows = 10;
          for (let y=0;y<rows;y++) for (let x=0;x<cols;x++) {
            ctx.fillStyle = p[1 + ((x+y) % (p.length-1))];
            ctx.globalAlpha = 0.4 + Math.random()*0.5;
            ctx.beginPath();
            ctx.arc(40 + x*65, 40 + y*63, 8 + Math.random()*16, 0, Math.PI*2);
            ctx.fill();
          }
        },
        // 5. Stacked semicircles (japanese seigaiha-ish)
        function semicircles(ctx, p) {
          for (let y=0;y<5;y++) {
            for (let x=-1;x<10;x++) {
              ctx.fillStyle = p[1 + (y % (p.length-1))];
              ctx.globalAlpha = 0.85;
              ctx.beginPath();
              ctx.arc(x*140 + (y%2)*70, y*130 + 60, 80, Math.PI, 0);
              ctx.fill();
            }
          }
        },
        // 6. Triangles tessellation
        function triangles(ctx, p) {
          const n = 14 + Math.floor(Math.random()*8);
          for (let i=0;i<n;i++) {
            ctx.fillStyle = p[1 + Math.floor(Math.random()*(p.length-1))];
            ctx.globalAlpha = 0.75 + Math.random()*0.2;
            ctx.beginPath();
            const x = Math.random()*1200, y = Math.random()*630;
            const s = 100 + Math.random()*220;
            const rot = Math.random()*Math.PI*2;
            ctx.translate(x,y); ctx.rotate(rot);
            ctx.moveTo(0, -s/2);
            ctx.lineTo(s/2, s/2);
            ctx.lineTo(-s/2, s/2);
            ctx.closePath();
            ctx.fill();
            ctx.setTransform(1,0,0,1,0,0);
          }
        },
        // 7. Minimal: single big shape + horizon line
        function minimalHorizon(ctx, p) {
          // horizon band
          ctx.fillStyle = p[1];
          ctx.fillRect(0, 380, 1200, 250);
          // sun/moon
          ctx.fillStyle = p[2];
          ctx.beginPath();
          ctx.arc(400 + Math.random()*400, 280 + Math.random()*80, 80 + Math.random()*60, 0, Math.PI*2);
          ctx.fill();
        },
        // 8. Crosshatch lines
        function crosshatch(ctx, p) {
          ctx.strokeStyle = p[2];
          ctx.lineWidth = 3 + Math.random()*4;
          ctx.globalAlpha = 0.6;
          for (let i=0;i<40;i++) {
            ctx.beginPath();
            ctx.moveTo(Math.random()*1200, 0);
            ctx.lineTo(Math.random()*1200, 630);
            ctx.stroke();
          }
          ctx.strokeStyle = p[3];
          for (let i=0;i<25;i++) {
            ctx.beginPath();
            ctx.moveTo(0, Math.random()*630);
            ctx.lineTo(1200, Math.random()*630);
            ctx.stroke();
          }
        },
        // 9. Quarter circles in corners
        function quartersCorners(ctx, p) {
          const corners = [[0,0],[1200,0],[0,630],[1200,630]];
          corners.forEach((c,i) => {
            ctx.fillStyle = p[1 + (i % (p.length-1))];
            ctx.globalAlpha = 0.85;
            const r = 200 + Math.random()*200;
            ctx.beginPath();
            ctx.arc(c[0], c[1], r, 0, Math.PI*2);
            ctx.fill();
          });
          // central small accent
          ctx.fillStyle = p[3];
          ctx.globalAlpha = 0.9;
          ctx.beginPath();
          ctx.arc(600, 315, 30 + Math.random()*40, 0, Math.PI*2);
          ctx.fill();
        },
        // 10. Vertical bars (newspaper columns)
        function verticalBars(ctx, p) {
          const cols = 5 + Math.floor(Math.random()*4);
          const w = 1200 / cols;
          for (let i=0;i<cols;i++) {
            ctx.fillStyle = p[1 + (i % (p.length-1))];
            ctx.globalAlpha = 0.85 + Math.random()*0.1;
            const h = 100 + Math.random()*530;
            ctx.fillRect(i*w + 8, (630-h)/2, w - 16, h);
          }
        },
        // 11. Mixed organic (original style, restrained)
        function organic(ctx, p) {
          const layers = 4 + Math.floor(Math.random()*3);
          for (let i=0;i<layers;i++) {
            ctx.fillStyle = p[1 + Math.floor(Math.random()*(p.length-1))];
            ctx.globalAlpha = 0.7 + Math.random()*0.2;
            const t = Math.random();
            if (t < 0.5) {
              ctx.beginPath();
              ctx.arc(Math.random()*1200, Math.random()*630, 100 + Math.random()*240, 0, Math.PI*2);
              ctx.fill();
            } else {
              const w = 200 + Math.random()*400, h = 100 + Math.random()*300;
              ctx.save();
              ctx.translate(Math.random()*1200, Math.random()*630);
              ctx.rotate((Math.random()-0.5)*Math.PI/3);
              ctx.fillRect(-w/2,-h/2,w,h);
              ctx.restore();
            }
          }
        },
        // 12. Single big circle (minimal poster)
        function bigCircle(ctx, p) {
          ctx.fillStyle = p[2];
          ctx.globalAlpha = 0.95;
          ctx.beginPath();
          ctx.arc(600, 315, 220 + Math.random()*60, 0, Math.PI*2);
          ctx.fill();
          // small accent
          ctx.fillStyle = p[3];
          ctx.globalAlpha = 0.9;
          ctx.beginPath();
          ctx.arc(600 + 120 + Math.random()*100, 315 - 80, 30 + Math.random()*20, 0, Math.PI*2);
          ctx.fill();
        },
      ];

      function generateGeometric() {
        const c = document.createElement('canvas');
        c.width = 1200; c.height = 630;
        const ctx = c.getContext('2d');
        const p = PALETTES[Math.floor(Math.random()*PALETTES.length)];
        ctx.fillStyle = p[0]; ctx.fillRect(0,0,1200,630);
        // very subtle vignette
        const g = ctx.createLinearGradient(0,0,1200,630);
        g.addColorStop(0, p[0]); g.addColorStop(1, shade(p[0], -3));
        ctx.fillStyle = g; ctx.fillRect(0,0,1200,630);
        // Pick a pattern, render at reduced opacity for calm look
        const pattern = PATTERNS[Math.floor(Math.random()*PATTERNS.length)];
        ctx.save();
        ctx.globalAlpha = 0.55;
        pattern(ctx, p);
        ctx.restore();
        // Subtle paper noise
        ctx.globalAlpha = 0.02;
        for (let i=0;i<800;i++) {
          ctx.fillStyle = '#000';
          ctx.fillRect(Math.random()*1200, Math.random()*630, 1, 1);
        }
        ctx.globalAlpha = 1;
        return c;
      }
      function shade(hex, percent) {
        const n = parseInt(hex.slice(1),16);
        let r=(n>>16)+percent, g=((n>>8)&0xff)+percent, b=(n&0xff)+percent;
        r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
        return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
      }
      const genBtn = $('[data-image-generate]');
      if (genBtn) genBtn.addEventListener('click', () => {
        const c = generateGeometric();
        c.toBlob(blob => {
          const file = new File([blob], 'geo-'+Date.now()+'.png', {type:'image/png'});
          const input = $('[data-image-file]');
          if (input) {
            try {
              const dt = new DataTransfer();
              dt.items.add(file);
              input.files = dt.files;
              input.dispatchEvent(new Event('change', {bubbles:true}));
            } catch(e){}
          }
          // also force preview
          const preview = $('[data-image-preview]');
          if (preview) {
            preview.style.backgroundImage = 'url("'+c.toDataURL('image/png')+'")';
            preview.style.backgroundSize = 'cover';
            preview.style.backgroundPosition = 'center';
            preview.style.aspectRatio = '1200 / 630';
            preview.style.borderRadius = '12px';
            preview.setAttribute('aria-hidden','false');
          }
        }, 'image/png');
      });
    })();
    </script>
    <script>
    (function () {
      function q(sel) { return document.querySelector(sel); }
      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, function (char) {
          return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char];
        });
      }
      function inline(value) {
        return escapeHtml(value)
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/(^|[^*])\*(?!\s)([^*]+?)\*(?!\*)/g, '$1<em>$2</em>');
      }
      function bodyToHtml(src) {
        var lines = String(src || '').replace(/\r\n?/g, '\n').split('\n');
        var html = '';
        var para = [];
        var inList = false;
        function flushPara() {
          if (!para.length) return;
          html += '<p>' + para.join('<br>') + '</p>';
          para = [];
        }
        function closeList() {
          if (!inList) return;
          html += '</ul>';
          inList = false;
        }
        lines.forEach(function (raw) {
          var line = raw.trim();
          var match;
          if (!line) { flushPara(); closeList(); return; }
          match = line.match(/^##\s+(.+)$/);
          if (match) { flushPara(); closeList(); html += '<h2>' + inline(match[1]) + '</h2>'; return; }
          match = line.match(/^[-*]\s+(.+)$/);
          if (match) {
            flushPara();
            if (!inList) { html += '<ul>'; inList = true; }
            html += '<li>' + inline(match[1]) + '</li>';
            return;
          }
          closeList();
          para.push(inline(line));
        });
        flushPara();
        closeList();
        return html;
      }
      function buildPreviewHtml() {
        var title = (q('input[name=title]') || {}).value || '(無題)';
        var desc = (q('textarea[name=description]') || {}).value || '';
        var body = (q('textarea[name=body]') || {}).value || '';
        var cat = (q('select[name=category]') || {}).value || '';
        var pubAt = (q('input[name=publishAt]') || {}).value || '';
        var datePart = pubAt.split('T')[0] || '';
        var dateLabel = '';
        if (datePart) {
          var parts = datePart.split('-');
          dateLabel = parseInt(parts[0], 10) + '年' + parseInt(parts[1], 10) + '月' + parseInt(parts[2], 10) + '日';
        }
        return '<!doctype html><html lang="ja"><head><meta charset="utf-8">' +
          '<meta name="viewport" content="width=device-width,initial-scale=1">' +
          '<link rel="stylesheet" href="https://spacegleam.co.jp/style.css?v=diag-top-white-wide-20260605-v25">' +
          '<style>body{margin:0}.preview-banner{position:sticky;top:0;z-index:100;padding:8px 16px;background:#111;color:#fff;font-size:12px;text-align:center;font-family:sans-serif}</style>' +
          '</head><body class="blog-page-body">' +
          '<div class="preview-banner">プレビュー</div><main class="blog-main"><div class="container"><article><header class="article-header">' +
          '<div class="article-meta">' + (dateLabel ? '<time datetime="' + escapeHtml(datePart) + '">' + dateLabel + '</time>' : '') + (cat ? '<span class="article-category">' + escapeHtml(cat) + '</span>' : '') + '</div>' +
          '<h1>' + escapeHtml(title) + '</h1>' + (desc ? '<p class="article-lead">' + escapeHtml(desc) + '</p>' : '') +
          '</header><div class="article-content">' + bodyToHtml(body) + '</div></article></div></main></body></html>';
      }
      document.addEventListener('click', function (event) {
        var previewButton = event.target.closest('[data-preview-draft]');
        if (previewButton) {
          event.preventDefault();
          var panel = q('[data-preview-panel]');
          var frame = q('[data-preview-frame]');
          if (!panel || !frame) {
            alert('プレビュー枠が見つかりません。ページを再読み込みしてください。');
            return;
          }
          frame.srcdoc = buildPreviewHtml();
          panel.hidden = false;
          return;
        }
        if (event.target.closest('[data-preview-close]')) {
          var closePanel = q('[data-preview-panel]');
          var closeFrame = q('[data-preview-frame]');
          if (closeFrame) closeFrame.removeAttribute('srcdoc');
          if (closePanel) closePanel.hidden = true;
        }
      }, true);
    })();
    </script>
</body>
