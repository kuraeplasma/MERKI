[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/functions/blog-admin.template.html"]

[[redirects]]
  from = "https://admin.spacegleam.co.jp/*"
  to = "/.netlify/functions/blog-admin"
  status = 200
  force = true

[[redirects]]
  from = "http://admin.spacegleam.co.jp/*"
  to = "/.netlify/functions/blog-admin"
  status = 200
  force = true

[[redirects]]
  from = "/blog/editor.html"
  to = "/.netlify/functions/blog-admin"
  status = 200

# Clean URL rewrites (extensionless URLs serve .html files)
[[redirects]]
  from = "/company"
  to = "/company.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/works"
  to = "/works.html"
  status = 200

[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/legal"
  to = "/legal.html"
  status = 200

[[redirects]]
  from = "/recruit"
  to = "/recruit.html"
  status = 200

# Redirect old .html URLs to clean URLs (301 permanent)
[[redirects]]
  from = "/company.html"
  to = "/company"
  status = 301

[[redirects]]
  from = "/contact.html"
  to = "/contact"
  status = 301

[[redirects]]
  from = "/services.html"
  to = "/services"
  status = 301

[[redirects]]
  from = "/pricing.html"
  to = "/pricing"
  status = 301

[[redirects]]
  from = "/works.html"
  to = "/works"
  status = 301

[[redirects]]
  from = "/faq.html"
  to = "/faq"
  status = 301

[[redirects]]
  from = "/terms.html"
  to = "/terms"
  status = 301

[[redirects]]
  from = "/privacy.html"
  to = "/privacy"
  status = 301

[[redirects]]
  from = "/legal.html"
  to = "/legal"
  status = 301

[[redirects]]
  from = "/recruit.html"
  to = "/recruit"
  status = 301

# 404 fallback (must be LAST)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
