[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/blog-admin"
  status = 200
  conditions = { Host = ["admin.spacegleam.co.jp"] }

[[redirects]]
  from = "/blog/editor.html"
  to = "/.netlify/functions/blog-admin"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
